services:
  postgres:
    image: postgres:16
    container_name: project-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-project_db}
      POSTGRES_USER: ${POSTGRES_USER:-project_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-project_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-project_user} -d ${POSTGRES_DB:-project_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: project-keycloak
    command: ["start-dev", "--http-port=8080"]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${KEYCLOAK_DB:-keycloak_db}
      KC_DB_USERNAME: ${POSTGRES_USER:-project_user}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-project_password}
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  spiffworkflow-db:
    image: postgres:16
    container_name: project-spiff-db
    environment:
      POSTGRES_DB: ${SPIFF_DB_NAME:-spiff_db}
      POSTGRES_USER: ${SPIFF_DB_USER:-spiff_user}
      POSTGRES_PASSWORD: ${SPIFF_DB_PASSWORD:-spiff_password}
    volumes:
      - spiff_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SPIFF_DB_USER:-spiff_user} -d ${SPIFF_DB_NAME:-spiff_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  spiffworkflow:
    image: ghcr.io/sartography/spiffworkflow-backend:latest
    container_name: project-spiffworkflow
    environment:
      DATABASE_URL: postgresql://${SPIFF_DB_USER:-spiff_user}:${SPIFF_DB_PASSWORD:-spiff_password}@spiffworkflow-db:5432/${SPIFF_DB_NAME:-spiff_db}
      SPIFF_BASE_URL: http://spiffworkflow:7000
      SPIFFWORKFLOW_BACKEND_BPMN_SPEC_ABSOLUTE_DIR: /app/process_models
    volumes:
      - ./spiff/bpmn:/app/process_models
    ports:
      - "7000:7000"
    depends_on:
      spiffworkflow-db:
        condition: service_healthy
    restart: unless-stopped

  novu-db:
    image: mongo:7
    container_name: project-novu-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${NOVU_DB_USER:-novu}
      MONGO_INITDB_ROOT_PASSWORD: ${NOVU_DB_PASSWORD:-novu_password}
    volumes:
      - novu_db_data:/data/db
    restart: unless-stopped

  novu-redis:
    image: redis:7-alpine
    container_name: project-novu-redis
    restart: unless-stopped

  novu:
    image: ghcr.io/novuhq/novu/api:latest
    container_name: project-novu
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGO_URL: mongodb://${NOVU_DB_USER:-novu}:${NOVU_DB_PASSWORD:-novu_password}@novu-db:27017/novu?authSource=admin
      REDIS_HOST: novu-redis
      REDIS_PORT: 6379
      JWT_SECRET: ${NOVU_JWT_SECRET:-change_me_novu_jwt_secret}
      STORE_ENCRYPTION_KEY: ${STORE_ENCRYPTION_KEY:-change_me_novu_store_key_32_chars}
      NOVU_STORE_ENCRYPTION_KEY: ${NOVU_STORE_ENCRYPTION_KEY:-change_me_novu_store_key_32_chars}
      NEW_RELIC_APP_NAME: ${NOVU_NEW_RELIC_APP_NAME:-project-novu}
      NEW_RELIC_ENABLED: ${NOVU_NEW_RELIC_ENABLED:-false}
    ports:
      - "3000:3000"
    depends_on:
      - novu-db
      - novu-redis
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: project-backend
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-project_user}:${POSTGRES_PASSWORD:-project_password}@postgres:5432/${POSTGRES_DB:-project_db}
      KEYCLOAK_URL: http://keycloak:8080
      SPIFF_BASE_URL: http://spiffworkflow:7000
      NOVU_API_URL: http://novu:3000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      spiffworkflow:
        condition: service_started
      novu:
        condition: service_started
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: project-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  spiff_db_data:
  novu_db_data:
